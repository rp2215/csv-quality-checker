<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Files — CSV Analyser</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="upload-page">

    <nav class="navbar">
        <div class="navbar-inner">
            <a href="{{ url_for('index') }}" class="navbar-logo">CSV <span>Analyser</span></a>
            <a href="{{ url_for('upload') }}" class="navbar-upload-btn">Upload Files</a>
        </div>
    </nav>

    <div class="upload-page-container">

        <div class="drop-zone-card">

            {% if error %}
                <div style="padding: 16px 40px 0;">
                    <p class="error-message">{{ error }}</p>
                </div>
            {% endif %}

            <form method="post" enctype="multipart/form-data" id="upload-form">

                <!-- CSV drop zone -->
                <div class="drop-zone" id="csv-drop-zone">

                    <div class="drop-zone-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>

                        </svg>
                    </div>

                    <h2 class="drop-zone-title">Upload your CSV files</h2>
                    <p class="drop-zone-subtitle">Drag and drop or click to select files</p>

                    <input
                        type="file"
                        id="csv_files"
                        name="csv_files"
                        accept=".csv"
                        multiple
                        class="file-input-hidden"
                    >

                    <label for="csv_files" class="select-file-btn">Select CSV Files</label>

                    <span class="drop-zone-filename" id="csv-drop-filename"></span>

                </div>

                <div class="upload-divider"></div>

                <!-- Rules file drop zone — identical layout to CSV zone -->
                <div class="drop-zone" id="rules-drop-zone">

                    <div class="drop-zone-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>

                        </svg>
                    </div>

                    <h2 class="drop-zone-title">
                        Attach a Rules File
                        <span class="optional-tag">Optional</span>
                    </h2>
                    <p class="drop-zone-subtitle">Drag and drop or click to select a JSON rules file</p>

                    <input
                        type="file"
                        id="rules_file"
                        name="rules_file"
                        accept=".json"
                        class="file-input-hidden"
                    >

                    <label for="rules_file" class="select-file-btn">Select Rules File</label>

                    <span class="drop-zone-filename" id="rules-drop-filename"></span>

                </div>

                <div class="upload-divider"></div>

                <!-- Rules builder link -->
                <div class="rules-builder-section">
                    <p>
                        Don't have a rules file?
                        <a href="{{ url_for('rules_builder') }}" class="rules-builder-link">Build one here →</a>
                    </p>
                </div>

                <div class="upload-divider"></div>

                <!-- Submit -->
                <div class="upload-submit-section">
                    <button type="submit" id="submit-button" class="analyse-btn">
                        Upload and Analyse
                    </button>
                </div>

            </form>

        </div>

    </div>

    <script>

        const form = document.getElementById("upload-form");
        const submitButton = document.getElementById("submit-button");

        // reusable drop zone setup — wires up file input, drag highlight, and drop handling
        function setupDropZone(dropZoneId, inputId, fileNameId) {

            const dropZone = document.getElementById(dropZoneId);
            const input = document.getElementById(inputId);
            const fileNameSpan = document.getElementById(fileNameId);

            // update label when files chosen via the button
            input.addEventListener("change", function () {
                updateFileLabel(fileNameSpan, this.files);
            });

            // highlight zone while a file is dragged over it
            dropZone.addEventListener("dragover", function (e) {
                e.preventDefault();
                dropZone.classList.add("drag-over");
            });

            dropZone.addEventListener("dragleave", function () {
                dropZone.classList.remove("drag-over");
            });

            // attach dropped files to the hidden input
            dropZone.addEventListener("drop", function (e) {
                e.preventDefault();
                dropZone.classList.remove("drag-over");

                const droppedFiles = e.dataTransfer.files;

                // DataTransfer lets us assign the dropped files to the input
                const dt = new DataTransfer();
                for (const file of droppedFiles) {
                    dt.items.add(file);
                }
                input.files = dt.files;

                updateFileLabel(fileNameSpan, droppedFiles);
            });
        }

        // updates the filename display beneath each select button
        function updateFileLabel(span, files) {
            if (files.length === 0) {
                span.textContent = "";
            } else if (files.length === 1) {
                span.textContent = files[0].name;
            } else {
                span.textContent = `${files.length} files selected`;
            }
        }
        
        // wire up both drop zones
        setupDropZone("csv-drop-zone", "csv_files", "csv-drop-filename");
        setupDropZone("rules-drop-zone", "rules_file", "rules-drop-filename");

        // loading state on submit
        form.addEventListener("submit", function () {
            submitButton.disabled = true;
            submitButton.textContent = "Analysing...";
        });

    </script>

</body>
</html>
